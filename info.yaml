# Tiny Tapeout project information
project:
  title:        "Operational Amplifier Test Circuits"      # Project title
  author:       "Pascal Gesell"      # Your name
  discord:      "gfcwfzkm"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "The test circuit contains an operational amplifier for external feedback, a voltage follower, and an R2R DAC." # One line description of what your project does
  language:     "Analog" # other examples include Verilog, Amaranth, VHDL, etc
  clock_hz:     0       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 200x150 uM.
  tiles: "1x2"          # Valid values for analog projects: 1x2, 2x2

  # How many analog pins does your project use?
  analog_pins: 3        # Valid values: 0 to 6

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_opamp_gfcwfzkm"

  # List your project's source files here. Source files must be in ./src and you must list each source file separately, one per line:
  source_files:        
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "DAC_0"
  ui[1]: "DAC_1"
  ui[2]: "DAC_2"
  ui[3]: "DAC_3"
  ui[4]: "DAC_4"
  ui[5]: "DAC_5"
  ui[6]: "DAC_6"
  ui[7]: "DAC_7"

  # Outputs
  uo[0]: "CIRC_DISABLED"
  uo[1]: "CIRC_ACTIVE_1"
  uo[2]: "CIRC_ACTIVE_2"
  uo[3]: "CIRC_ACTIVE_3"
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: "PTAT_STARTUP"

  # Bidirectional pins
  uio[0]: "CIRC_SEL_0"
  uio[1]: "CIRC_SEL_1"
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

  # Analog pins - make sure to also set "analog_pins" above, else the pins won't be connected
  ua[0]: "OUTA"
  ua[1]: "INA"
  ua[2]: "DD3"
  ua[3]: ""
  ua[4]: ""
  ua[5]: ""

# Do not change!
yaml_version: 6
